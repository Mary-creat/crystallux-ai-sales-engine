<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset your password | Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; form-action 'self'; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
  .auth-shell{max-width:420px;margin:80px auto;padding:0 20px}
  .auth-card{background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:14px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
  .auth-title{font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:-0.01em}
  .auth-sub{font-size:14px;color:var(--text-secondary);margin-bottom:20px;line-height:1.55}
  .auth-field{margin-bottom:14px}
  .auth-field label{display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
  .auth-field input{width:100%;padding:11px 14px;font:inherit;font-size:14px;background:var(--bg-default);color:var(--text-primary);border:1px solid var(--border-default);border-radius:8px;outline:none;transition:border-color .15s,box-shadow .15s}
  .auth-field input:focus{border-color:var(--color-brand-500);box-shadow:0 0 0 3px var(--color-brand-100)}
  .auth-btn{width:100%;padding:12px 20px;border-radius:8px;border:none;font:inherit;font-weight:600;font-size:14px;cursor:pointer;background:var(--color-brand-600);color:#fff;transition:background .15s;margin-top:6px}
  .auth-btn:hover{background:var(--color-brand-700)}
  .auth-btn:disabled{opacity:0.65;cursor:wait}
  .auth-msg{padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:14px;display:none}
  .auth-msg.show{display:block}
  .auth-msg.error{background:rgba(239,68,68,0.08);color:var(--color-error-500);border:1px solid rgba(239,68,68,0.25)}
  .auth-msg.info{background:var(--color-brand-50);color:var(--color-brand-700);border:1px solid var(--color-brand-200)}
  .auth-foot{text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted)}
  .auth-foot a{color:var(--color-brand-600);font-weight:600;text-decoration:none}
  .auth-foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<header class="clx-header">
  <div class="clx-header-inner">
    <a href="index.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux</a>
  </div>
</header>

<main class="auth-shell">
  <div class="auth-card">
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-sub">Enter the email associated with your Crystallux account. We'll send a link to set a new password. The link is valid for 1 hour.</p>

    <div class="auth-msg" id="msg" role="alert" aria-live="polite"></div>

    <form id="resetForm" novalidate>
      <div class="auth-field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required inputmode="email">
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Send reset link</button>
    </form>

    <div class="auth-foot">
      Remembered it? <a href="/login.html">Back to sign in</a>
    </div>
  </div>
</main>

<script>
(function() {
  var URL = 'https://automation.crystallux.org/webhook/auth/password-reset-request';
  var msg = document.getElementById('msg');
  var btn = document.getElementById('submitBtn');

  function setMsg(text, kind) {
    msg.className = 'auth-msg show ' + (kind || 'info');
    msg.textContent = text;
  }

  document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    msg.className = 'auth-msg';
    var email = document.getElementById('email').value.trim();
    if (!email) { setMsg('Enter your email.', 'error'); return; }
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      var res = await fetch(URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      });
      var data = await res.json().catch(function(){ return {}; });
      // Always show same message — do not leak account existence.
      setMsg(data.message || 'If that email is associated with an account, a reset link is on the way.', 'info');
    } catch (err) {
      setMsg('Network error. Try again.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send reset link';
    }
  });
})();
</script>
</body>
</html>
