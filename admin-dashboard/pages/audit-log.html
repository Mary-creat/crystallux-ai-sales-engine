<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audit Log · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Audit Log</h1>
      <div class="clx-page-sub">Recent sessions and admin actions.</div>
    </div></div>
    <div class="clx-card" style="padding:0;margin-bottom:16px">
      <div class="clx-card-head" style="padding:16px 18px 0"><div class="clx-card-title">Active sessions</div></div>
      <div id="sessionsTable"></div>
    </div>
    <div class="clx-card" style="padding:0">
      <div class="clx-card-head" style="padding:16px 18px 0"><div class="clx-card-title">Admin actions</div></div>
      <div id="actionsTable"></div>
    </div>
  </div></main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
var ACTION_ICONS = {
  'login': 'log-in',
  'logout': 'log-out',
  'create': 'plus-circle',
  'update': 'edit',
  'delete': 'trash',
  'view': 'eye'
};
var ROLE_ICONS = { admin: 'shield', client: 'user', team_member: 'users' };

clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  document.getElementById('sessionsTable').innerHTML = clxComp.skeleton(5, 5);
  document.getElementById('actionsTable').innerHTML = clxComp.skeleton(6, 5);
  load();
});
async function load() {
  var res = await clxApi.adminGet('audit-log');
  var sEl = document.getElementById('sessionsTable');
  var aEl = document.getElementById('actionsTable');
  if (!res.ok) { clxApi.renderError(sEl, res); aEl.innerHTML = ''; return; }
  var d = res.data || {};

  var sessions = d.sessions || [];
  if (!sessions.length) clxComp.renderEmpty(sEl, 'No active sessions.', 'shield');
  else clxComp.renderTable(sEl, sessions, [
    { key: 'email',           label: 'User', html: true, format: function(r){
        return '<span style="display:inline-flex;align-items:center;gap:8px">' +
          clxComp.avatar(r.email, 'sm') +
          clxComp.escapeHtml(r.email || '—') + '</span>';
      } },
    { key: 'user_role',       label: 'Role', html: true, format: function(r){
        var ic = ROLE_ICONS[r.user_role] || 'user';
        return '<span style="display:inline-flex;align-items:center;gap:6px">' +
          clxComp.icon(ic, 'sm') +
          '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.user_role) + '">' + clxComp.escapeHtml(r.user_role || '—') + '</span></span>';
      } },
    { key: 'ip_address',      label: 'IP' },
    { key: 'created_at',      label: 'Started',  format: function(r){ return clxComp.formatDateTime(r.created_at); } },
    { key: 'last_activity_at',label: 'Last seen', format: function(r){ return clxComp.relativeTime(r.last_activity_at); } },
    { key: 'expires_at',      label: 'Expires', format: function(r){ return clxComp.formatDateTime(r.expires_at); } }
  ]);

  var actions = d.actions || [];
  if (!actions.length) clxComp.renderEmpty(aEl, 'No admin actions logged yet.', 'shield');
  else clxComp.renderTable(aEl, actions, [
    { key: 'actor_email',  label: 'Actor', html: true, format: function(r){
        return '<span style="display:inline-flex;align-items:center;gap:8px">' +
          clxComp.avatar(r.actor_email, 'sm') +
          clxComp.escapeHtml(r.actor_email || '—') + '</span>';
      } },
    { key: 'action',       label: 'Action', html: true, format: function(r){
        var key = (r.action || '').toLowerCase().split('.')[0].split('_')[0];
        var ic = ACTION_ICONS[key] || 'activity';
        return '<span style="display:inline-flex;align-items:center;gap:6px">' +
          clxComp.icon(ic, 'sm') +
          clxComp.escapeHtml(r.action || '—') + '</span>';
      } },
    { key: 'target_type',  label: 'Target type' },
    { key: 'target_id',    label: 'Target id' },
    { key: 'occurred_at',  label: 'When', format: function(r){ return clxComp.relativeTime(r.occurred_at); } }
  ]);
}
</script>
</body>
</html>
