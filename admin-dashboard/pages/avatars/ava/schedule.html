<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AVA broadcast schedule · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
<style>
  .sc-section { margin-bottom:28px; }
  .sc-section-head { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border,#e5e7eb); }
  .sc-section-title { font-size:16px; font-weight:700; }
  .sc-section-count { font-size:13px; color:var(--text-muted,#6b7280); }
  .sc-row { display:flex; align-items:center; gap:14px; padding:12px 14px; border:1px solid var(--border,#e5e7eb); border-radius:8px; background:var(--bg-card,#fff); margin-bottom:8px; }
  .sc-row.queued    { border-left:4px solid #2563eb; }
  .sc-row.rendering { border-left:4px solid #f59e0b; }
  .sc-row.ready     { border-left:4px solid #16a34a; }
  .sc-row.published { border-left:4px solid #16a34a; opacity:0.72; }
  .sc-row.archived  { border-left:4px solid #9ca3af; opacity:0.6; }
  .sc-row .sc-when { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:var(--text-muted,#6b7280); min-width:160px; }
  .sc-row .sc-topic { flex:1; }
  .sc-row .sc-topic-title { font-weight:600; font-size:14px; }
  .sc-row .sc-topic-meta { font-size:11px; color:var(--text-muted,#71717a); margin-top:2px; }
  .sc-platforms { display:flex; gap:4px; flex-wrap:wrap; max-width:200px; }
  .sc-platform { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10px; background:var(--bg-hover,#f4f4f5); color:var(--text-secondary,#52525b); padding:1px 6px; border-radius:8px; }
  .sc-cancel-btn { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; }
  .sc-cancel-btn:hover { background:#fecaca; }
  .sc-status-pill { font-size:11px; padding:1px 7px; border-radius:10px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .sc-status-pill.queued    { background:#dbeafe; color:#1e40af; }
  .sc-status-pill.rendering { background:#fef3c7; color:#92400e; }
  .sc-status-pill.ready     { background:#dcfce7; color:#166534; }
  .sc-status-pill.published { background:#e0e7ff; color:#3730a3; }
  .sc-status-pill.archived  { background:#f3f4f6; color:#52525b; }
  .sc-status-pill.failed    { background:#fee2e2; color:#991b1b; }

  /* Schedule modal */
  .sc-modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; }
  .sc-modal-backdrop.open { display:block; }
  .sc-modal { position:fixed; right:0; top:0; bottom:0; width:min(520px, 95vw); background:var(--bg-card,#fff); border-left:1px solid var(--border,#e5e7eb); z-index:201; padding:24px 28px; overflow-y:auto; box-shadow:-8px 0 24px rgba(0,0,0,0.12); transform:translateX(100%); transition:transform 0.18s ease; }
  .sc-modal-backdrop.open .sc-modal { transform:translateX(0); }
  .sc-modal-close { position:absolute; top:14px; right:18px; cursor:pointer; font-size:22px; line-height:1; color:var(--text-muted,#6b7280); border:none; background:transparent; }
  .sc-modal h2 { font-size:18px; font-weight:700; margin:0 0 14px; padding-right:36px; }
  .sc-platform-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; margin-top:6px; }
  .sc-platform-opt { display:flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid var(--border,#d1d5db); border-radius:6px; cursor:pointer; }
  .sc-platform-opt:hover { background:var(--bg-hover,#f4f4f5); }
  .sc-platform-opt input { margin:0; }
  .sc-platform-opt.selected { border-color:var(--color-brand-500,#7C3AED); background:rgba(124,58,237,0.06); }
</style>
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head">
      <div>
        <a href="/pages/avatars/ava/index.html" style="color:var(--text-muted,#6b7280);font-size:13px;display:inline-flex;align-items:center;gap:4px;text-decoration:none">‹ AVA topics</a>
        <h1 class="clx-page-title" style="margin-top:4px">AVA broadcast schedule</h1>
        <div class="clx-page-sub">Queue content topics for AVA broadcasts. HeyGen video render fills <code>content_video_id</code> when the AVA video pipeline is wired up; for now schedules sit in the queue as plans.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <select id="statusFilter" class="clx-select" style="width:140px">
          <option value="">All statuses</option>
          <option value="queued" selected>Queued</option>
          <option value="rendering">Rendering</option>
          <option value="ready">Ready</option>
          <option value="published">Published</option>
          <option value="archived">Archived</option>
        </select>
        <button id="refreshBtn" class="clx-btn clx-btn-secondary">Refresh</button>
        <button id="newScheduleBtn" class="clx-btn clx-btn-primary">+ Schedule a topic</button>
      </div>
    </div>

    <div id="kpiGrid" class="clx-stat-grid"></div>
    <div id="scheduleContent"></div>
  </div></main>
</div>

<!-- Schedule modal -->
<div class="sc-modal-backdrop" id="scheduleBackdrop">
  <div class="sc-modal" id="schedulePanel" onclick="event.stopPropagation()">
    <button class="sc-modal-close" id="scheduleClose" aria-label="Close">×</button>
    <h2>Schedule a topic for AVA</h2>
    <form id="scheduleForm" class="clx-form" style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label for="topicSelect">Content topic <span style="color:#dc2626">*</span></label>
        <select id="topicSelect" required class="clx-input">
          <option value="">Loading topics…</option>
        </select>
        <div id="topicPreview" style="margin-top:6px;padding:8px 10px;background:var(--bg-hover,#f9fafb);border-radius:6px;font-size:12px;color:var(--text-muted,#6b7280);min-height:20px;display:none"></div>
      </div>
      <div>
        <label for="scheduledFor">Scheduled for <span style="color:#dc2626">*</span></label>
        <input type="datetime-local" id="scheduledFor" required class="clx-input">
      </div>
      <div>
        <label>Platforms</label>
        <div class="sc-platform-grid">
          <label class="sc-platform-opt"><input type="checkbox" value="tiktok"    > TikTok</label>
          <label class="sc-platform-opt"><input type="checkbox" value="instagram" > Instagram</label>
          <label class="sc-platform-opt"><input type="checkbox" value="youtube"   > YouTube</label>
          <label class="sc-platform-opt"><input type="checkbox" value="facebook"  > Facebook</label>
          <label class="sc-platform-opt"><input type="checkbox" value="linkedin"  > LinkedIn</label>
          <label class="sc-platform-opt"><input type="checkbox" value="x"         > X / Twitter</label>
        </div>
      </div>
      <div>
        <label for="scheduleNotes">Notes (optional)</label>
        <textarea id="scheduleNotes" maxlength="500" rows="2" class="clx-input" placeholder="Any context for this broadcast…"></textarea>
      </div>
      <div id="scheduleError" style="color:#dc2626;font-size:13px;display:none"></div>
      <div style="display:flex;gap:10px;margin-top:6px">
        <button type="submit" class="clx-btn clx-btn-primary">Add to queue</button>
        <button type="button" id="scheduleCancel" class="clx-btn clx-btn-secondary">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script src="/shared/copilot.js"></script>
<script>
var SECTION_ORDER = [
  { key: 'queued',    label: 'Queued',    emoji: '📋' },
  { key: 'rendering', label: 'Rendering', emoji: '⏳' },
  { key: 'ready',     label: 'Ready to publish', emoji: '✓' },
  { key: 'published', label: 'Published', emoji: '📡' },
  { key: 'archived',  label: 'Archived / cancelled', emoji: '×' }
];

var STATE = { rows: [], byStatus: {}, counts: {}, topics: [] };

clxAuth.require(['admin']).then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  clxComp.wireSidebar(document.getElementById('clxSidebar'), document.getElementById('clxBurger'), document.getElementById('clxBackdrop'));

  for (var i = 0; i < 4; i++) {
    document.getElementById('kpiGrid').insertAdjacentHTML('beforeend',
      '<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>');
  }
  document.getElementById('scheduleContent').innerHTML = '<div class="clx-empty"><span class="clx-spinner"></span> Loading schedule…</div>';
  load();
  document.getElementById('statusFilter').addEventListener('change', load);
  document.getElementById('refreshBtn').addEventListener('click', load);
  document.getElementById('newScheduleBtn').addEventListener('click', openModal);

  var bd = document.getElementById('scheduleBackdrop');
  bd.addEventListener('click', closeModal);
  document.getElementById('scheduleClose').addEventListener('click', closeModal);
  document.getElementById('scheduleCancel').addEventListener('click', closeModal);
  document.getElementById('scheduleForm').addEventListener('submit', submitSchedule);
  document.getElementById('topicSelect').addEventListener('change', updateTopicPreview);

  // Highlight selected platform options
  document.querySelectorAll('.sc-platform-opt input').forEach(function (el) {
    el.addEventListener('change', function () {
      el.closest('.sc-platform-opt').classList.toggle('selected', el.checked);
    });
  });
});

async function callFlow(body) {
  var token = localStorage.getItem('clx_session_token') || '';
  var r = await fetch('https://automation.crystallux.org/webhook/admin/avatar-schedule', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(body || {})
  });
  var t = await r.text(); var d = null; try { d = t ? JSON.parse(t) : null; } catch(_) {}
  return { http: r.status, ok: r.ok && d && d.ok, data: d };
}

async function load() {
  var statusFilter = document.getElementById('statusFilter').value;
  var res = await callFlow({ action: 'list', avatar_name: 'AVA', status_filter: statusFilter || null });
  if (!res.ok) {
    clxApi.renderError(document.getElementById('scheduleContent'), res.data || { error: 'HTTP ' + res.http });
    return;
  }
  STATE.rows     = res.data.rows     || [];
  STATE.byStatus = res.data.by_status || {};
  STATE.counts   = res.data.counts   || {};
  renderKpis();
  render();
}

function renderKpis() {
  var c = STATE.counts;
  clxComp.renderStatGrid(document.getElementById('kpiGrid'), [
    { label: 'Total in view', value: c.total || 0,     icon: 'layers',       variant: 'leads' },
    { label: 'Queued',        value: c.queued || 0,    icon: 'clock',        variant: 'activity' },
    { label: 'Ready',         value: c.ready || 0,     icon: 'check-circle', variant: 'revenue' },
    { label: 'Published',     value: c.published || 0, icon: 'radio',        variant: 'bookings' }
  ]);
}

function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  return d.toLocaleString('en-CA', { dateStyle: 'medium', timeStyle: 'short' });
}

function render() {
  var el = document.getElementById('scheduleContent');
  if (!STATE.rows.length) {
    el.innerHTML = '<div class="clx-empty">Nothing in the queue. Click "+ Schedule a topic" to add the first broadcast. (104 topics already seeded — see <a href="/pages/avatars/ava/index.html">AVA topics</a>.)</div>';
    return;
  }
  var html = '';
  SECTION_ORDER.forEach(function (sec) {
    var rows = STATE.byStatus[sec.key] || [];
    if (!rows.length) return;
    html += '<div class="sc-section">';
    html += '<div class="sc-section-head">';
    html += '<span style="font-size:18px">' + sec.emoji + '</span>';
    html += '<div class="sc-section-title">' + clxComp.escapeHtml(sec.label) + '</div>';
    html += '<div class="sc-section-count">' + rows.length + (rows.length === 1 ? ' topic' : ' topics') + '</div>';
    html += '</div>';
    rows.forEach(function (r) {
      var topic = r.content_topics || {};
      var platforms = Array.isArray(r.intended_platforms) ? r.intended_platforms : [];
      html += '<div class="sc-row ' + clxComp.escapeHtml(r.status) + '">';
      html += '<div class="sc-when">' + clxComp.escapeHtml(fmtTime(r.scheduled_for)) + '</div>';
      html += '<div class="sc-topic">';
      html += '<div class="sc-topic-title">' + clxComp.escapeHtml(topic.topic_title || '(no topic)') + '</div>';
      html += '<div class="sc-topic-meta">priority ' + (topic.priority_score || 0) +
              ' · ' + clxComp.escapeHtml(topic.vertical || 'general') +
              (r.notes ? ' · ' + clxComp.escapeHtml(r.notes) : '') + '</div>';
      html += '</div>';
      html += '<div class="sc-platforms">';
      platforms.forEach(function (p) { html += '<span class="sc-platform">' + clxComp.escapeHtml(p) + '</span>'; });
      if (platforms.length === 0) html += '<span style="font-size:11px;color:var(--text-muted,#9ca3af)">no platforms set</span>';
      html += '</div>';
      html += '<span class="sc-status-pill ' + clxComp.escapeHtml(r.status) + '">' + clxComp.escapeHtml(r.status) + '</span>';
      if (r.status === 'queued' || r.status === 'rendering' || r.status === 'ready') {
        html += '<button class="sc-cancel-btn" data-id="' + clxComp.escapeHtml(r.id) + '">Cancel</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
  el.querySelectorAll('.sc-cancel-btn').forEach(function (b) {
    b.addEventListener('click', function () { cancelRow(b.dataset.id); });
  });
}

async function cancelRow(libraryId) {
  if (!confirm('Cancel this broadcast? It will be moved to archived.')) return;
  var res = await callFlow({ action: 'cancel', library_id: libraryId });
  if (!res.ok) { alert('Cancel failed: ' + ((res.data && res.data.error) || 'HTTP ' + res.http)); return; }
  load();
}

async function openModal() {
  var bd = document.getElementById('scheduleBackdrop');
  // Default scheduled-for: tomorrow 9am local
  var d = new Date(); d.setDate(d.getDate() + 1); d.setHours(9, 0, 0, 0);
  var pad = function (n) { return n < 10 ? '0'+n : ''+n; };
  document.getElementById('scheduledFor').value =
    d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
    'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());

  // Lazy-load topic list on first open via the existing avatar-content-list workflow
  if (!STATE.topics.length) {
    var sel = document.getElementById('topicSelect');
    sel.innerHTML = '<option value="">Loading topics…</option>';
    var res = await clxApi.adminGet('avatar-content/list', { avatar_name: 'AVA', status: 'approved' });
    if (!res.ok || !res.data) {
      sel.innerHTML = '<option value="">(failed to load topics)</option>';
    } else {
      var rows = res.data.topics || [];
      STATE.topics = rows;
      var opts = ['<option value="">— pick a topic —</option>'];
      // Order by priority desc
      rows.sort(function (a, b) { return (b.priority_score || 0) - (a.priority_score || 0); });
      rows.forEach(function (t) {
        opts.push('<option value="' + clxComp.escapeHtml(t.id) + '">[' + (t.priority_score || 0) + '] ' + clxComp.escapeHtml(t.topic_title || '(untitled)') + '</option>');
      });
      sel.innerHTML = opts.join('');
    }
  }
  bd.classList.add('open');
}

function closeModal() {
  document.getElementById('scheduleBackdrop').classList.remove('open');
  document.getElementById('scheduleError').style.display = 'none';
}

function updateTopicPreview() {
  var id = document.getElementById('topicSelect').value;
  var preview = document.getElementById('topicPreview');
  if (!id) { preview.style.display = 'none'; return; }
  var t = STATE.topics.filter(function (x) { return x.id === id; })[0];
  if (!t) { preview.style.display = 'none'; return; }
  preview.style.display = 'block';
  preview.textContent = t.topic_description || '(no description)';
}

async function submitSchedule(e) {
  e.preventDefault();
  var errEl = document.getElementById('scheduleError');
  errEl.style.display = 'none';
  var topicId = document.getElementById('topicSelect').value;
  var schedLocal = document.getElementById('scheduledFor').value;
  if (!topicId)   { errEl.style.display='block'; errEl.textContent='Pick a topic.'; return; }
  if (!schedLocal){ errEl.style.display='block'; errEl.textContent='Pick a scheduled time.'; return; }
  var platforms = [];
  document.querySelectorAll('.sc-platform-opt input:checked').forEach(function (el) { platforms.push(el.value); });
  var btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Scheduling…';
  var res = await callFlow({
    action:             'schedule',
    avatar_name:        'AVA',
    content_topic_id:   topicId,
    scheduled_for:      new Date(schedLocal).toISOString(),
    intended_platforms: platforms,
    notes:              document.getElementById('scheduleNotes').value.trim() || null
  });
  btn.disabled = false; btn.textContent = 'Add to queue';
  if (!res.ok) {
    errEl.style.display = 'block';
    errEl.textContent = (res.data && res.data.error) || ('Schedule failed (HTTP ' + res.http + ').');
    return;
  }
  document.getElementById('scheduleForm').reset();
  document.querySelectorAll('.sc-platform-opt').forEach(function (el) { el.classList.remove('selected'); });
  closeModal();
  load();
}
</script>
</body>
</html>
