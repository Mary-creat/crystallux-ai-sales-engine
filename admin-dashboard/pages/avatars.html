<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avatars · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
<style>
.av-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.av-card { padding:18px; border:1px solid var(--border, #e5e7eb); border-radius:8px; background:#fff; transition:box-shadow 0.15s; }
.av-card:hover { box-shadow:0 4px 14px rgba(0,0,0,0.08); }
.av-card-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.av-swatch { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
.av-name { font-weight:700; font-size:18px; }
.av-tagline { color:var(--muted,#6b7280); font-size:13px; margin-bottom:14px; min-height:32px; }
.av-meta { display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:12px; }
.av-meta dt { color:var(--muted,#6b7280); }
.av-meta dd { margin:0; }
.av-status { display:inline-block; padding:2px 10px; border-radius:11px; font-size:11px; font-weight:600; }
.av-status-active { background:#dcfce7; color:#166534; }
.av-status-dormant { background:#f3f4f6; color:#6b7280; }
.av-catchphrase { font-style:italic; color:var(--muted,#6b7280); font-size:13px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--border,#e5e7eb); }
.av-warn { padding:14px 16px; border-radius:8px; background:#fef3c7; color:#92400e; font-size:13px; margin-bottom:16px; }
</style>
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Avatars</h1>
      <div class="clx-page-sub">The 7 brand voices Crystallux runs across verticals. Active rows route real traffic; dormant rows are configured but not yet launched.</div>
    </div></div>

    <div id="avContent">
      <div class="clx-empty"><span class="clx-spinner"></span> Loading avatars…</div>
    </div>
  </div></main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
clxAuth.require(['admin']).then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  clxComp.wireSidebar(document.getElementById('clxSidebar'), document.getElementById('clxBurger'), document.getElementById('clxBackdrop'));
  load();
});

async function load() {
  var el = document.getElementById('avContent');
  var res = await clxApi.call('/avatars/list', {});
  if (!res.ok) { clxApi.renderError(el, res); return; }

  var avatars = (res.data && res.data.data && res.data.data.avatars) || [];
  if (!avatars.length) {
    el.innerHTML =
      '<div class="av-warn">No avatars in the registry. The migration ' +
      '<code>db/migrations/avatars-platform-schema.sql</code> needs to be ' +
      'applied to Supabase before any rows appear here.</div>';
    return;
  }

  var activeCount = avatars.filter(function (a) { return a.active; }).length;
  var withHeyGen = avatars.filter(function (a) { return a.heygen_avatar_id; }).length;

  var stats = '<div class="clx-stat-grid">' +
    '<div class="clx-stat"><div class="clx-stat-label">Registered</div><div class="clx-stat-value">' + avatars.length + '</div></div>' +
    '<div class="clx-stat"><div class="clx-stat-label">Active</div><div class="clx-stat-value">' + activeCount + '</div><div class="clx-stat-sub">' + (avatars.length - activeCount) + ' dormant</div></div>' +
    '<div class="clx-stat"><div class="clx-stat-label">HeyGen ID set</div><div class="clx-stat-value">' + withHeyGen + ' / ' + avatars.length + '</div></div>' +
    '</div>';

  var cards = '<div class="av-grid">' + avatars.map(card).join('') + '</div>';

  el.innerHTML = stats + cards;
}

function card(a) {
  var personality = a.personality_profile || {};
  var branding    = a.branding || {};
  var schedule    = a.content_schedule || {};
  var compliance  = a.compliance_rules || {};
  var statusCls   = a.active ? 'av-status-active' : 'av-status-dormant';
  var statusText  = a.active ? 'Active' : 'Dormant';

  var swatch = branding.primary_color
    ? '<span class="av-swatch" style="background:' + esc(branding.primary_color) + '"></span>'
    : '';

  var windowsHtml = (schedule.broadcast_windows || []).map(function (w) {
    return esc((w.days || []).join('/')) + ' ' + esc(w.start) + '–' + esc(w.end);
  }).join('<br>') || '—';

  var heygen = a.heygen_avatar_id ? '<code>' + esc(a.heygen_avatar_id) + '</code>' : '<span style="color:#9ca3af">— not set —</span>';
  var voice  = a.elevenlabs_voice_id ? '<code>' + esc(a.elevenlabs_voice_id) + '</code>' : '<span style="color:#9ca3af">— not set —</span>';

  return '<div class="av-card">' +
    '<div class="av-card-head">' + swatch +
      '<div class="av-name">' + esc(a.avatar_name) + '</div>' +
      '<span class="av-status ' + statusCls + '" style="margin-left:auto">' + statusText + '</span>' +
    '</div>' +
    '<div class="av-tagline">' + esc(a.tagline || a.display_name || '') + '</div>' +
    '<dl class="av-meta">' +
      '<dt>Vertical</dt><dd>' + esc(a.business_vertical) + '</dd>' +
      '<dt>Tone</dt><dd>' + esc(personality.voice_tone || '—') + '</dd>' +
      '<dt>Archetype</dt><dd>' + esc(personality.archetype || '—') + '</dd>' +
      '<dt>Schedule</dt><dd>' + windowsHtml + '</dd>' +
      '<dt>Channel</dt><dd>' + esc(a.default_outbound_channel) + '</dd>' +
      '<dt>HeyGen</dt><dd>' + heygen + '</dd>' +
      '<dt>Voice</dt><dd>' + voice + '</dd>' +
      '<dt>Framework</dt><dd>' + esc((compliance.regulatory_framework || []).join(', ') || '—') + '</dd>' +
    '</dl>' +
    (a.catchphrase ? '<div class="av-catchphrase">“' + esc(a.catchphrase) + '”</div>' : '') +
    '</div>';
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
</script>
</body>
</html>
