<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workflows · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Workflows</h1>
      <div class="clx-page-sub">n8n workflow status &amp; recent errors.</div>
    </div></div>
    <div class="clx-stat-grid" id="wfStats"></div>
    <div class="clx-card" style="padding:0">
      <div class="clx-card-head" style="padding:16px 18px 0"><div class="clx-card-title">Workflows</div></div>
      <div id="wfTable"></div>
    </div>
  </div></main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));

  var stats = document.getElementById('wfStats');
  for (var i = 0; i < 4; i++) {
    stats.insertAdjacentHTML('beforeend',
      '<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>');
  }
  document.getElementById('wfTable').innerHTML = clxComp.skeleton(8, 5);

  load();
});
async function load() {
  var res = await clxApi.adminGet('workflow-status');
  var el = document.getElementById('wfTable');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  clxComp.renderStatGrid(document.getElementById('wfStats'), [
    { label: 'Total runs (24h)', value: d.runs_24h     != null ? d.runs_24h     : '—',
      icon: 'activity', variant: 'leads' },
    { label: 'Errors (24h)',     value: d.errors_24h   != null ? d.errors_24h   : '—',
      icon: 'alert-triangle', variant: 'errors' },
    { label: 'Avg duration',     value: d.avg_ms       != null ? d.avg_ms + ' ms' : '—',
      icon: 'clock', variant: 'bookings' },
    { label: 'Active workflows', value: d.active_count != null ? d.active_count : '—',
      icon: 'zap', variant: 'activity' }
  ]);
  var rows = d.workflows || [];
  if (!rows.length) { clxComp.renderEmpty(el, 'No workflow data yet.', 'zap'); return; }
  clxComp.renderTable(el, rows, [
    { key: 'name',        label: 'Workflow' },
    { key: 'last_status', label: 'Last status', html: true, format: function(r){
        var s = (r.last_status || '').toLowerCase();
        var ic = s === 'success' ? 'check-circle' : (s === 'error' || s === 'failed') ? 'x-circle' : 'clock';
        var pulse = s === 'running' ? ' --pulse' : '';
        return '<span style="display:inline-flex;align-items:center;gap:6px">' +
          clxComp.icon(ic, 'sm') +
          '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.last_status) + pulse + '">' +
          clxComp.escapeHtml(r.last_status || '—') + '</span></span>';
      } },
    { key: 'runs_24h',    label: 'Runs (24h)' },
    { key: 'errors_24h',  label: 'Errors (24h)', html: true, format: function(r){
        var n = r.errors_24h || 0, total = r.runs_24h || 0;
        var pct = total > 0 ? (n/total*100) : 0;
        return '<span style="display:inline-flex;align-items:center;gap:8px;min-width:90px">' +
          '<span style="width:50px">' + clxComp.progressBar(pct, 100) + '</span>' +
          '<span style="font-size:12px;color:' + (n > 0 ? 'var(--danger)' : 'var(--text-muted)') + '">' + n + '</span></span>';
      } },
    { key: 'last_run_at', label: 'Last run', format: function(r){ return clxComp.relativeTime(r.last_run_at); } }
  ]);
}
</script>
</body>
</html>
