<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onboarding · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Onboarding</h1>
      <div class="clx-page-sub">Clients moving through onboarding stages.</div>
    </div></div>
    <div id="obContent"><div class="clx-loading-row"><span class="clx-spinner"></span> Loading…</div></div>
  </div></main>
</div>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/components.js"></script>
<script>
clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  load();
});
async function load() {
  var res = await clxApi.adminGet('onboarding-pipeline');
  var el = document.getElementById('obContent');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  var rows = d.clients || [];
  if (!rows.length) {
    clxApi.renderEmpty(el, 'No clients in onboarding right now.', '◐');
    return;
  }
  rows.forEach(function (r) { r._href = '/pages/client-detail.html?id=' + encodeURIComponent(r.id); });
  el.innerHTML = '<div class="clx-card" style="padding:0"><div id="obTable"></div></div>';
  clxComp.renderTable(document.getElementById('obTable'), rows, [
    { key: 'client_name',     label: 'Client' },
    { key: 'industry',        label: 'Industry' },
    { key: 'onboarding_stage',label: 'Stage', format: function(r){
        return '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.onboarding_stage) + '">' + clxComp.escapeHtml(r.onboarding_stage || '—') + '</span>';
      }, html: true },
    { key: 'started_at',      label: 'Started',  format: function(r){ return clxComp.formatDate(r.started_at); } },
    { key: 'days_in_stage',   label: 'Days in stage' },
    { key: 'next_action',     label: 'Next action' }
  ]);
}
</script>
</body>
</html>
