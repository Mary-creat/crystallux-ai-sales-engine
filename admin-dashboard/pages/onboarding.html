<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onboarding · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Onboarding</h1>
      <div class="clx-page-sub">Clients moving through onboarding stages.</div>
    </div></div>

    <div id="stagePipeline"></div>
    <div id="obContent"></div>
  </div></main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script src="/shared/copilot.js"></script>
<script>
var STAGES = [
  { key: 'intake',        label: 'Intake',        icon: 'inbox' },
  { key: 'provisioning',  label: 'Provisioning',  icon: 'settings' },
  { key: 'content_setup', label: 'Content setup', icon: 'edit' },
  { key: 'first_send',    label: 'First send',    icon: 'mail' },
  { key: 'active',        label: 'Active',        icon: 'check-circle' }
];

clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));

  // Skeleton state
  var pipe = document.getElementById('stagePipeline');
  pipe.innerHTML = '<div class="clx-pipeline">' +
    STAGES.map(function(){ return '<div class="clx-pipeline-stage"><span class="clx-skeleton" style="height:60px"></span></div>'; }).join('') +
    '</div>';
  document.getElementById('obContent').innerHTML = clxComp.skeleton(8, 5);

  load();
});
async function load() {
  var res = await clxApi.adminGet('onboarding-pipeline');
  var el = document.getElementById('obContent');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  var rows = d.clients || [];
  var counts = d.stage_counts || {};
  var total = Object.keys(counts).reduce(function(s,k){ return s + (counts[k]||0); }, 0) || rows.length;

  // Stage pipeline
  var pipe = document.getElementById('stagePipeline');
  pipe.innerHTML = '<div class="clx-pipeline">' + STAGES.map(function(s){
    var n = counts[s.key] || rows.filter(function(r){ return (r.onboarding_stage||'') === s.key; }).length;
    var pct = total > 0 ? (n/total*100) : 0;
    return '<div class="clx-pipeline-stage">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      clxComp.icon(s.icon, 'md') +
      '<div class="clx-stat-label" style="margin:0">' + s.label + '</div></div>' +
      '<div class="clx-stat-value" style="font-size:22px">' + n + '</div>' +
      clxComp.progressBar(pct, 100) +
      '</div>';
  }).join('') + '</div>';

  if (!rows.length) {
    clxComp.renderEmpty(el, 'No clients in onboarding right now.', 'briefcase');
    return;
  }
  rows.forEach(function (r) { r._href = '/pages/client-detail.html?id=' + encodeURIComponent(r.id); });
  el.innerHTML = '<div class="clx-card" style="padding:0"><div class="clx-card-head" style="padding:16px 18px 0"><div class="clx-card-title">Active onboarding</div></div><div id="obTable"></div></div>';
  clxComp.renderTable(document.getElementById('obTable'), rows, [
    { key: 'client_name',     label: 'Client', html: true, format: function(r){
        return '<span style="display:inline-flex;align-items:center;gap:10px">' +
          clxComp.avatar(r.client_name) +
          clxComp.escapeHtml(r.client_name || '—') + '</span>';
      } },
    { key: 'industry',        label: 'Industry' },
    { key: 'onboarding_stage',label: 'Stage', html: true, format: function(r){
        return '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.onboarding_stage) + '">' + clxComp.escapeHtml(r.onboarding_stage || '—') + '</span>';
      } },
    { key: 'progress',        label: 'Progress', html: true, format: function(r){
        var idx = STAGES.findIndex(function(s){ return s.key === r.onboarding_stage; });
        var pct = idx < 0 ? 0 : ((idx + 1) / STAGES.length * 100);
        return '<span style="display:inline-flex;align-items:center;gap:8px;min-width:120px">' +
          '<span style="flex:1;min-width:60px">' + clxComp.progressBar(pct, 100) + '</span>' +
          '<span style="font-size:12px;color:var(--text-muted)">' + (idx + 1) + '/' + STAGES.length + '</span></span>';
      } },
    { key: 'days_in_stage',   label: 'Days in stage', html: true, format: function(r){
        var d = r.days_in_stage || 0;
        var color = d > 14 ? 'var(--danger)' : d > 7 ? 'var(--warning)' : 'var(--text-muted)';
        return '<span style="color:' + color + ';font-weight:' + (d > 7 ? '600' : '400') + '">' + d + 'd</span>';
      } },
    { key: 'next_action',     label: 'Next action' }
  ]);
}
</script>
</body>
</html>
