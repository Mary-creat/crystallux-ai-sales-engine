<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Intelligence · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Market Intelligence</h1>
      <div class="clx-page-sub">Signals processed, vertical activity, intelligence-tier health.</div>
    </div></div>
    <div class="clx-stat-grid" id="miStats"></div>

    <div class="clx-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
      <div class="clx-card" style="padding:0">
        <div class="clx-card-head" style="padding:16px 18px 0"><div class="clx-card-title">Active signals</div></div>
        <div id="miTable"></div>
      </div>
      <div class="clx-card">
        <div class="clx-card-head"><div class="clx-card-title">Severity mix</div></div>
        <div id="miDonut" style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;min-height:140px"></div>
      </div>
    </div>
  </div></main>
</div>
<style>@media (max-width:900px){.clx-two-col{grid-template-columns:1fr !important}}</style>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));

  var stats = document.getElementById('miStats');
  for (var i = 0; i < 5; i++) {
    stats.insertAdjacentHTML('beforeend',
      '<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>');
  }
  document.getElementById('miTable').innerHTML = clxComp.skeleton(6, 4);
  document.getElementById('miDonut').innerHTML = '<span class="clx-skeleton" style="width:120px;height:120px;border-radius:50%"></span>';

  load();
});
async function load() {
  var res = await clxApi.adminGet('market-intelligence');
  var el = document.getElementById('miTable');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  clxComp.renderStatGrid(document.getElementById('miStats'), [
    { label: 'Raw signals (24h)', value: d.raw_24h        != null ? d.raw_24h        : '—',
      icon: 'activity', variant: 'leads' },
    { label: 'Processed (24h)',   value: d.processed_24h  != null ? d.processed_24h  : '—',
      icon: 'sparkles', variant: 'activity' },
    { label: 'Active signals',    value: d.active_signals != null ? d.active_signals : '—',
      icon: 'alert-triangle', variant: 'errors' },
    { label: 'Intelligence subs', value: d.intel_subs     != null ? d.intel_subs     : '—',
      icon: 'eye', variant: 'bookings' },
    { label: 'Tokens used (mtd)', value: d.tokens_mtd     != null ? d.tokens_mtd.toLocaleString() : '—',
      icon: 'layers', variant: 'revenue' }
  ]);

  var rows = d.signals || [];
  var donutEl = document.getElementById('miDonut');
  if (!rows.length) {
    clxComp.renderEmpty(el, 'No active signals right now.', 'sparkles');
    clxComp.renderEmpty(donutEl, 'No data yet', 'pie-chart');
    return;
  }

  // Severity donut
  var sevCounts = {};
  rows.forEach(function(r){
    var s = (r.severity || 'unknown').toLowerCase();
    sevCounts[s] = (sevCounts[s]||0) + 1;
  });
  var sevColors = { critical: '#EF4444', high: '#F97316', medium: '#F59E0B', low: '#10B981', unknown: '#A1A1AA' };
  var slices = Object.keys(sevCounts).map(function(k){
    return { label: k, value: sevCounts[k], color: sevColors[k] };
  }).sort(function(a,b){ return b.value - a.value; });
  donutEl.innerHTML = clxComp.donut(slices, { centerLabel: rows.length, centerSub: 'signals' }) +
    '<div style="flex:1;min-width:140px">' + clxComp.donutLegend(slices) + '</div>';

  // Signals table with severity color + pulse on critical
  clxComp.renderTable(el, rows, [
    { key: 'signal_type',         label: 'Type' },
    { key: 'affected_verticals',  label: 'Verticals', format: function(r){
        return Array.isArray(r.affected_verticals) ? r.affected_verticals.join(', ') : (r.affected_verticals || '—');
      } },
    { key: 'severity',            label: 'Severity', html: true, format: function(r){
        var s = (r.severity || '').toLowerCase();
        var pulse = s === 'critical' ? ' --pulse' : '';
        return '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.severity) + pulse + '">' + clxComp.escapeHtml(r.severity || '—') + '</span>';
      } },
    { key: 'expires_at',          label: 'Expires', format: function(r){ return clxComp.formatDateTime(r.expires_at); } },
    { key: 'processed_at',        label: 'Processed', format: function(r){ return clxComp.relativeTime(r.processed_at); } }
  ]);
}
</script>
</body>
</html>
