<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clients · Crystallux Admin</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <button class="clx-icon-btn clx-burger" id="clxBurger" aria-label="Open navigation">☰</button>
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Admin</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <div class="clx-backdrop" id="clxBackdrop"></div>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head">
      <div>
        <h1 class="clx-page-title">Clients</h1>
        <div class="clx-page-sub">All clients across the platform.</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="clx-input" id="searchInput" placeholder="Search by name or industry…" style="min-width:240px">
        <select class="clx-select" id="filterActive" style="width:140px">
          <option value="all">All</option>
          <option value="active" selected>Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div id="clientsTable"><div class="clx-loading-row"><span class="clx-spinner"></span> Loading clients…</div></div>
  </div></main>
</div>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/components.js"></script>
<script>
var __all = [];
clxAuth.require('admin').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  load();
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterActive').addEventListener('change', render);
});

async function load() {
  var res = await clxApi.adminGet('list-clients', {});
  var el = document.getElementById('clientsTable');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  __all = (res.data && res.data.clients) || [];
  render();
}

function render() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var f = document.getElementById('filterActive').value;
  var rows = __all.filter(function (c) {
    if (f === 'active'   && c.active === false) return false;
    if (f === 'inactive' && c.active !== false) return false;
    if (!q) return true;
    return [c.client_name, c.industry, c.city].some(function (v) { return (v || '').toLowerCase().indexOf(q) !== -1; });
  });
  rows.forEach(function (r) { r._href = '/pages/client-detail.html?id=' + encodeURIComponent(r.id); });
  clxComp.renderTable(document.getElementById('clientsTable'), rows, [
    { key: 'client_name', label: 'Client' },
    { key: 'industry',    label: 'Industry' },
    { key: 'city',        label: 'City' },
    { key: 'active', label: 'Status', format: function (r) {
        var s = r.active === false ? 'inactive' : 'active';
        return '<span class="clx-badge clx-badge-' + clxComp.badgeFor(s) + '">' + s + '</span>';
      }, html: true },
    { key: 'subscription_status', label: 'Billing', format: function (r) {
        return '<span class="clx-badge clx-badge-' + clxComp.badgeFor(r.subscription_status) + '">' + clxComp.escapeHtml(r.subscription_status || '—') + '</span>';
      }, html: true },
    { key: 'monthly_retainer', label: 'Retainer', format: function (r) { return clxComp.formatMoney(r.monthly_retainer); } }
  ], { empty: 'No clients match your filters.' });
}
</script>
</body>
</html>
