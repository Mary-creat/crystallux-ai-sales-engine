<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Redirecting…</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com;">
<script>
  // Thin bounce page — used when an admin page detects no session.
  // The auth.js gate redirects directly, but Cloudflare Pages routes
  // 401-equivalent SPA states (handled by _redirects) here as a
  // safety net.
  var next = encodeURIComponent(location.href);
  location.replace('https://crystallux.org/login.html?next=' + next);
</script>
</head>
<body style="font-family:system-ui;text-align:center;padding:80px;color:#52525B;font-size:13px">
  Redirecting to sign in…
</body>
</html>
