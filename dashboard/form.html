<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in touch — Crystallux</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f7f8fa; color: #2c3e50; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; max-width: 520px; width: 100%; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a365d; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #2d3748; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.1); }
    textarea { resize: vertical; min-height: 80px; }
    button { width: 100%; padding: 12px; background: #1a365d; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: #2c5282; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
    .msg.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
    .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .footer { margin-top: 24px; font-size: 11px; color: #a0aec0; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Get in touch</h1>
    <p class="subtitle">Leave your details and we'll be in touch shortly.</p>

    <form id="intakeForm">
      <div class="field">
        <label for="full_name">Your name *</label>
        <input id="full_name" name="full_name" type="text" required />
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input id="company" name="company" type="text" />
      </div>

      <div class="field">
        <label for="city">City</label>
        <input id="city" name="city" type="text" />
      </div>

      <div class="field">
        <label for="message">How can we help?</label>
        <textarea id="message" name="message" rows="3"></textarea>
      </div>

      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div class="msg success" id="successMsg">Thanks — we will be in touch shortly.</div>
    <div class="msg error" id="errorMsg"></div>

    <div class="footer">Powered by Crystallux</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const clientSlug = params.get('client') || window.location.pathname.split('/').pop();
    const WEBHOOK_URL = 'https://automation.crystallux.org/webhook/form-intake';

    document.getElementById('intakeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const success = document.getElementById('successMsg');
      const error = document.getElementById('errorMsg');
      success.style.display = 'none';
      error.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const payload = {
        client_slug: clientSlug,
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        company: document.getElementById('company').value,
        city: document.getElementById('city').value,
        message: document.getElementById('message').value,
        source: 'public_form'
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          success.style.display = 'block';
          document.getElementById('intakeForm').reset();
        } else {
          error.textContent = (data.errors && data.errors.join(', ')) || 'Submission failed.';
          error.style.display = 'block';
        }
      } catch (err) {
        error.textContent = 'Network error — please try again.';
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    });
  </script>
</body>
</html>
