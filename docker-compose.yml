# Crystallux Universal AI Sales Engine
# Docker Compose Configuration — Swarm Compatible
# Deployed on Hostinger VPS running Docker
# Can be promoted to Docker Swarm with 'docker stack deploy'

version: '3.8'

services:

  # ── n8n Main Instance ──────────────────────────
  # Runs the workflow editor UI and manages triggers
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${POSTGRES_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_MODE=regular
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      # Uncomment the line below after setting REDIS_PASSWORD in .env
      # - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=${WEBHOOK_URL}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── n8n Worker ─────────────────────────────────
  # Processes workflow jobs from the Redis queue
  # Scale replicas up when client load increases
  # Example: docker service scale crystallux_n8n-worker=3
  n8n-worker:
    image: n8nio/n8n:latest
    command: worker
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${POSTGRES_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      # Uncomment the line below after setting REDIS_PASSWORD in .env
      # - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    depends_on:
      - redis
      - n8n
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  # ── Redis ──────────────────────────────────────
  # Message queue between n8n main and workers
  # Required when EXECUTIONS_MODE=queue
  # To enable Redis authentication:
  #   1. Set REDIS_PASSWORD in your .env file
  #   2. Uncomment the 'command' line below
  #   3. Uncomment QUEUE_BULL_REDIS_PASSWORD in n8n and n8n-worker above
  #   4. Run: docker compose down && docker compose up -d
  #   See docs/setup/redis-security.md for full instructions
  redis:
    image: redis:7-alpine
    restart: always
    # Uncomment to enable password authentication:
    # command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

# ── Persistent Volumes ─────────────────────────
# Data survives container restarts
volumes:
  n8n_data:
  redis_data:
