<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Products · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/principal/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a>
  </div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">Products</h1><div class="clx-page-sub">Carrier products available for placement. v2 recommendation engine ranks from this catalog.</div></div></div>
      <div id="content"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['mga_principal','admin','supervisor']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      load();
    });
    function load() {
      var c = document.getElementById('content');
      clxApi.mgaPost('carriers-list', {}).then(function (resp) {
        if (!resp.ok) { c.innerHTML = '<div class="clx-error-box">' + clxApi.escapeHtml(resp.error || 'Failed to load.') + '</div>'; return; }
        var carriers = (resp.data && resp.data.carriers) || [];
        var rows = [];
        carriers.forEach(function (cr) {
          (cr.products || []).forEach(function (p) {
            rows.push({ carrier: cr.carrier_name, product: p.product_name, type: p.product_type, min: p.min_coverage_cents, max: p.max_coverage_cents, ai_ready: p.ai_compliance_ready, active: p.active, commission_fy: p.commission_first_year });
          });
        });
        var html = '<div class="clx-card"><div class="clx-card-head"><div><div class="clx-card-title">Product catalog (' + rows.length + ')</div></div></div>';
        if (rows.length === 0) html += '<div class="clx-empty">No carrier products yet. Seed via the carrier-seed workflow or add manually.</div>';
        else html += clxComp.renderTable(rows, [
          { label: 'Carrier', cell: function (r) { return clxApi.escapeHtml(r.carrier); } },
          { label: 'Product', cell: function (r) { return clxApi.escapeHtml(r.product); } },
          { label: 'Type', cell: function (r) { return clxApi.escapeHtml(r.type); } },
          { label: 'Coverage range', cell: function (r) { return clxApi.formatMoney(r.min) + ' – ' + clxApi.formatMoney(r.max); } },
          { label: 'First-year commission', cell: function (r) { return r.commission_fy != null ? r.commission_fy + '%' : '—'; } },
          { label: 'AI ready', cell: function (r) { return r.ai_ready ? '<span class="clx-badge clx-badge-success">Yes</span>' : '<span class="clx-badge clx-badge-neutral">No</span>'; } },
          { label: 'Active', cell: function (r) { return r.active ? '<span class="clx-badge clx-badge-success">Yes</span>' : '<span class="clx-badge clx-badge-danger">No</span>'; } }
        ]);
        html += '</div>';
        c.innerHTML = html;
      });
    }
  })();
</script>
</body>
</html>
