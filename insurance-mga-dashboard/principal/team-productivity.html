<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Productivity · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/principal/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a>
  </div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">Team Productivity</h1><div class="clx-page-sub">Per-advisor productivity score, trend, coaching flags.</div></div></div>
      <div id="content"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['mga_principal','admin','supervisor']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      load(user);
    });
    function load(user) {
      var c = document.getElementById('content');
      // Trigger a fresh aggregation (idempotent for today) and then surface the summaries.
      clxApi.postWebhook('productivity/summary/run', { client_id: user.client_id }).then(function (resp) {
        if (!resp.ok) { c.innerHTML = '<div class="clx-error-box">' + clxApi.escapeHtml(resp.error || 'Team productivity surface not yet active. Activate clx-daily-summary-generator-v1.') + '</div>'; return; }
        var d = resp.data || {};
        var summaries = Array.isArray(d.summaries) ? d.summaries : [];
        var html = '<div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">Today\'s productivity (' + summaries.length + ' advisors)</div></div>';
        if (summaries.length === 0) html += '<div class="clx-empty">No summaries returned. Either the aggregator has not run or activity_log is empty for today.</div>';
        else html += clxComp.renderTable(summaries, [
          { label: 'Advisor', cell: function (s) { return clxApi.escapeHtml(s.agent_name || s.agent_id); } },
          { label: 'Score', cell: function (s) { return s.productivity_score != null ? Math.round(s.productivity_score) + ' / 100' : '—'; } },
          { label: 'Trend', cell: function (s) {
              var t = s.trend || 'insufficient_data';
              var cls = t === 'improving' ? 'clx-badge-success' : (t === 'declining' ? 'clx-badge-danger' : 'clx-badge-neutral');
              return '<span class="clx-badge ' + cls + '">' + clxApi.escapeHtml(t) + '</span>';
            } },
          { label: 'Productive min', cell: function (s) { return (s.productive_minutes || 0) + ' / ' + (s.total_minutes_tracked || 0); } },
          { label: 'Calls · Emails · Meetings', cell: function (s) { return (s.calls_made || 0) + ' · ' + (s.emails_sent || 0) + ' · ' + (s.meetings_held || 0); } },
          { label: 'Flags', cell: function (s) {
              var flags = Array.isArray(s.coaching_flags) ? s.coaching_flags : [];
              if (flags.length === 0) return '<span class="clx-badge clx-badge-success">None</span>';
              return '<span class="clx-badge clx-badge-warning">' + flags.length + '</span>';
            } }
        ]);
        html += '</div>';
        c.innerHTML = html;
      });
    }
  })();
</script>
</body>
</html>
