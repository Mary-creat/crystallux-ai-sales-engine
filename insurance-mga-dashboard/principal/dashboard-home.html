<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/principal/dashboard-home.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a>
  </div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">MGA Dashboard</h1><div class="clx-page-sub">Four-quadrant landing — top advisors, compliance alerts, pending quotes, recent applications.</div></div></div>
      <div class="clx-two-col">
        <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">🏆 Top advisors (this month)</div></div><div id="qTop"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
        <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">⚠️ Compliance alerts</div></div><div id="qCompliance"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
      </div>
      <div class="clx-two-col">
        <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">⏳ Pending carrier quotes</div></div><div id="qQuotes"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
        <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">📑 Recent applications</div></div><div id="qApps"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
      </div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['mga_principal','admin']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      load(user);
    });
    function fail(el, err) { el.innerHTML = '<div class="clx-card-sub" style="color:var(--muted)">' + clxApi.escapeHtml(err || 'Not available yet.') + '</div>'; }
    function load(user) {
      // Top advisors: from team goals (sort by avg achievement %).
      clxApi.postApi('goals/team', { client_id: user.client_id }).then(function (resp) {
        var el = document.getElementById('qTop');
        if (!resp.ok) return fail(el, resp.error);
        var team = (resp.data && resp.data.team) || [];
        var ranked = team.map(function (m) {
          var goals = Array.isArray(m.goals) ? m.goals : [];
          var avg = goals.length > 0 ? Math.round(goals.reduce(function (a, g) { return a + (parseFloat(g.achievement_percentage) || 0); }, 0) / goals.length) : 0;
          return { name: m.full_name || m.email, avg: avg, goals: goals.length };
        }).sort(function (a, b) { return b.avg - a.avg; }).slice(0, 5);
        if (ranked.length === 0) { el.innerHTML = '<div class="clx-empty">No goal data yet.</div>'; return; }
        el.innerHTML = '<ul class="clx-bullet-list">' + ranked.map(function (r) { return '<li><strong>' + clxApi.escapeHtml(r.name) + '</strong> — ' + r.avg + '% avg achievement (' + r.goals + ' goals)</li>'; }).join('') + '</ul>';
      });

      // Compliance alerts: from existing compliance queue endpoint (reuse).
      clxApi.mgaPost('principal/compliance-queue', {}).then(function (resp) {
        var el = document.getElementById('qCompliance');
        if (!resp.ok) return fail(el, resp.error);
        var queue = (resp.data && (resp.data.queue || resp.data.reviews)) || [];
        if (queue.length === 0) { el.innerHTML = '<div class="clx-empty">No alerts. 🎉</div>'; return; }
        el.innerHTML = '<ul class="clx-bullet-list">' + queue.slice(0, 5).map(function (r) { return '<li>' + clxComp.reviewTypeIcon(r.review_type) + ' — ' + clxApi.escapeHtml(r.summary || r.lead_name || r.client_name || '—') + '</li>'; }).join('') + '</ul>';
      });

      // Pending quotes: from carriers-list, count carrier_quotes? Use mgaPost wrapping our own endpoint.
      clxApi.mgaPost('carriers-list', {}).then(function (resp) {
        var el = document.getElementById('qQuotes');
        if (!resp.ok) return fail(el, resp.error);
        var carriers = (resp.data && resp.data.carriers) || [];
        el.innerHTML = '<div class="clx-card-sub">' + carriers.length + ' carriers configured, ' + ((resp.data && resp.data.products_total) || 0) + ' products available. Pending quote queue surfaces here once advisors submit suitability assessments.</div>';
      });

      // Recent applications: reuse the principal/applications endpoint if it exists.
      clxApi.mgaPost('principal/applications', {}).then(function (resp) {
        var el = document.getElementById('qApps');
        if (!resp.ok) return fail(el, resp.error);
        var apps = (resp.data && (resp.data.applications || resp.data.list)) || [];
        if (apps.length === 0) { el.innerHTML = '<div class="clx-empty">No applications yet.</div>'; return; }
        el.innerHTML = '<ul class="clx-bullet-list">' + apps.slice(0, 5).map(function (a) { return '<li>' + clxApi.escapeHtml(a.advisor_name || '—') + ' — ' + clxApi.escapeHtml(a.product_type || '') + ' (' + clxApi.escapeHtml(a.status || '') + ')</li>'; }).join('') + '</ul>';
      });
    }
  })();
</script>
</body>
</html>
