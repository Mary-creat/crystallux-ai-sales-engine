<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Applications · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left"><a href="/advisor/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a></div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">Applications</h1><div class="clx-page-sub">Policy applications by status.</div></div></div>
      <div class="clx-card"><div id="content"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script><script src="/shared/api.js"></script><script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['advisor','sub_agent','mga_principal','admin']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      var c = document.getElementById('content');
      clxApi.mgaPost('advisor/applications', {}).then(function (resp) {
        if (!resp.ok) { c.innerHTML = '<div class="clx-error-box">' + clxApi.escapeHtml(resp.error || 'Failed.') + '</div>'; return; }
        var rows = (resp.data && resp.data.applications) || [];
        if (rows.length === 0) { c.innerHTML = clxComp.renderState('empty', 'No applications yet.'); return; }
        c.innerHTML = clxComp.renderTable(rows, [
          { label: 'Carrier', cell: function (r) { return clxApi.escapeHtml(r.carrier_name || '—'); } },
          { label: 'Policy #', cell: function (r) { return clxApi.escapeHtml(r.policy_number || '—'); } },
          { label: 'Advisor review', cell: function (r) { var cls = r.advisor_review_status === 'approved' ? 'clx-badge-success' : 'clx-badge-warning'; return '<span class="clx-badge ' + cls + '">' + clxApi.escapeHtml(r.advisor_review_status || '—') + '</span>'; } },
          { label: 'Submission', cell: function (r) { var cls = r.submission_status === 'issued' ? 'clx-badge-success' : (r.submission_status === 'declined' ? 'clx-badge-danger' : 'clx-badge-info'); return '<span class="clx-badge ' + cls + '">' + clxApi.escapeHtml(r.submission_status || '—') + '</span>'; } },
          { label: 'In force', cell: function (r) { var cls = r.in_force_status === 'in_force' ? 'clx-badge-success' : (r.in_force_status === 'lapsed' || r.in_force_status === 'cancelled' ? 'clx-badge-danger' : 'clx-badge-neutral'); return '<span class="clx-badge ' + cls + '">' + clxApi.escapeHtml(r.in_force_status || '—') + '</span>'; } },
          { label: 'Issued', cell: function (r) { return clxApi.formatDate(r.issued_at); } },
          { label: 'Renewal', cell: function (r) { return clxApi.formatDate(r.renewal_date); } }
        ]);
      });
    });
  })();
</script>
</body>
</html>
