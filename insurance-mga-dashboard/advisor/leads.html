<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leads · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left"><a href="/advisor/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a></div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">Leads</h1><div class="clx-page-sub">Your assigned book.</div></div></div>
      <div class="clx-card"><div id="content"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script><script src="/shared/api.js"></script><script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['advisor','sub_agent','mga_principal','admin']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      var c = document.getElementById('content');
      clxApi.mgaPost('advisor/leads', {}).then(function (resp) {
        if (!resp.ok) { c.innerHTML = '<div class="clx-error-box">' + clxApi.escapeHtml(resp.error || 'Failed.') + '</div>'; return; }
        var rows = (resp.data && resp.data.leads) || [];
        if (rows.length === 0) { c.innerHTML = clxComp.renderState('empty', 'No assigned leads yet.'); return; }
        c.innerHTML = clxComp.renderTable(rows, [
          { label: 'Name', cell: function (r) { return clxApi.escapeHtml(r.full_name || r.first_name || '—'); } },
          { label: 'Company', cell: function (r) { return clxApi.escapeHtml(r.company || '—'); } },
          { label: 'Industry', cell: function (r) { return clxApi.escapeHtml(r.industry || '—'); } },
          { label: 'City', cell: function (r) { return clxApi.escapeHtml(r.city || '—'); } },
          { label: 'Status', cell: function (r) { return '<span class="clx-badge clx-badge-info">' + clxApi.escapeHtml(r.lead_status || '—') + '</span>'; } },
          { label: 'Score', cell: function (r) { return clxApi.escapeHtml(String(r.lead_score || '—')); } },
          { label: 'Created', cell: function (r) { return clxApi.formatDate(r.date_created); } }
        ]);
      });
    });
  })();
</script>
</body>
</html>
