<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commissions · Crystallux Insurance MGA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left"><a href="/advisor/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-vertical-badge">Insurance MGA</span></a></div>
  <div class="clx-topbar-right" id="topbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="sidebar"></nav>
  <main class="clx-main">
    <div class="clx-content">
      <div class="clx-page-head"><div><h1 class="clx-page-title">Commissions</h1><div class="clx-page-sub">Earnings ledger + payout status.</div></div></div>
      <div id="totals" class="clx-stat-grid"></div>
      <div class="clx-card"><div id="content"><div class="clx-empty"><span class="clx-spinner"></span> Loading…</div></div></div>
    </div>
  </main>
</div>
<script src="/shared/auth.js"></script><script src="/shared/api.js"></script><script src="/shared/components-mga.js"></script>
<script>
  (function () {
    fetch('/shared/nav.html').then(function (r) { return r.text(); }).then(function (h) { document.getElementById('sidebar').innerHTML = h; });
    clxAuth.require(['advisor','sub_agent','mga_principal','admin']).then(function (user) {
      if (!user) return;
      document.getElementById('topbarRight').innerHTML = '<span class="clx-user-chip">' + clxApi.escapeHtml(user.email || '') + ' · <span class="clx-role-pill">' + clxApi.escapeHtml(user.user_role || user.role) + '</span></span>';
      var c = document.getElementById('content');
      var t = document.getElementById('totals');
      clxApi.mgaPost('advisor/commissions', {}).then(function (resp) {
        if (!resp.ok) { c.innerHTML = '<div class="clx-error-box">' + clxApi.escapeHtml(resp.error || 'Failed.') + '</div>'; return; }
        var d = resp.data || {};
        var totals = d.totals || {};
        t.innerHTML = '<div class="clx-stat"><div class="clx-stat-label">Earned (lifetime)</div><div class="clx-stat-value">' + clxApi.formatMoney(totals.earned_cents) + '</div></div>' +
                      '<div class="clx-stat"><div class="clx-stat-label">Pending payout</div><div class="clx-stat-value">' + clxApi.formatMoney(totals.pending_cents) + '</div></div>' +
                      '<div class="clx-stat"><div class="clx-stat-label">Paid</div><div class="clx-stat-value">' + clxApi.formatMoney(totals.paid_cents) + '</div></div>';
        var rows = d.commissions || [];
        if (rows.length === 0) { c.innerHTML = clxComp.renderState('empty', 'No commission entries yet.'); return; }
        c.innerHTML = clxComp.renderTable(rows, [
          { label: 'Date', cell: function (r) { return clxApi.formatDate(r.created_at); } },
          { label: 'Carrier', cell: function (r) { return clxApi.escapeHtml(r.carrier_name || '—'); } },
          { label: 'Product', cell: function (r) { return clxApi.escapeHtml(r.product_type || '—'); } },
          { label: 'Policy #', cell: function (r) { return clxApi.escapeHtml(r.policy_number || '—'); } },
          { label: 'Premium', cell: function (r) { return clxApi.formatMoney(r.premium_amount); } },
          { label: 'Your cut', cell: function (r) { return '<strong>' + clxApi.formatMoney(r.advisor_commission) + '</strong>'; } },
          { label: 'Payout', cell: function (r) { var cls = r.payout_status === 'paid' ? 'clx-badge-success' : (r.payout_status === 'held' ? 'clx-badge-danger' : 'clx-badge-info'); return '<span class="clx-badge ' + cls + '">' + clxApi.escapeHtml(r.payout_status || '—') + '</span>'; } },
          { label: 'Paid on', cell: function (r) { return clxApi.formatDate(r.payout_date); } }
        ]);
      });
    });
  })();
</script>
</body>
</html>
