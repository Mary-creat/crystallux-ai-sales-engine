<a href="#" data-nav="logout" id="navLogout">Sign out</a>

<script>
  (function () {
    // Hide principal-only items if user is not mga_principal/admin/compliance_officer.
    document.addEventListener('DOMContentLoaded', function () {
      var role = (window.clxAuth && clxAuth.getRole && clxAuth.getRole()) || '';
      if (role !== 'mga_principal' && role !== 'admin' && role !== 'compliance_officer') {
        document.querySelectorAll('[data-principal-only]').forEach(function (el) { el.style.display = 'none'; });
      }
      var current = window.location.pathname.split('/').pop().replace('.html', '');
      document.querySelectorAll('[data-nav]').forEach(function (el) {
        var key = el.getAttribute('data-nav');
        if (key === current || (current === 'overview' && el.getAttribute('href').indexOf(window.location.pathname.indexOf('principal') >= 0 ? 'principal' : 'advisor') >= 0 && key.indexOf(current) >= 0)) {
          el.classList.add('active');
        }
      });
      var logout = document.getElementById('navLogout');
      if (logout) logout.addEventListener('click', function (e) { e.preventDefault(); window.clxAuth.clearSession(); window.location.href = '/login.html'; });
    });
  })();
</script>
