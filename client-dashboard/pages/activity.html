<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity · Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Client</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Activity</h1>
      <div class="clx-page-sub">Latest changes across your pipeline.</div>
    </div></div>
    <div id="activityList"></div>
  </div></main>
</div>
<nav class="clx-bottom-nav" id="clxBottomNav"></nav>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script src="/shared/copilot.js"></script>
<script>
var EVT_ICON = {
  status_change: 'arrow-right',
  contact:       'mail',
  contacted:     'mail',
  reply:         'message-square',
  replied:       'message-square',
  booking:       'calendar',
  booked:        'calendar',
  scored:        'sparkles',
  researched:    'eye',
  lost:          'x-circle',
  imported:      'inbox',
  default:       'activity'
};
var EVT_VARIANT = {
  status_change: 'purple', contact: 'sky', contacted: 'sky',
  reply: 'amber', replied: 'amber', booking: 'emerald', booked: 'emerald',
  scored: 'purple', researched: 'gray', lost: 'rose', imported: 'gray', default: 'purple'
};

clxAuth.require('client').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.injectBottomNav(document.getElementById('clxBottomNav'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  document.getElementById('activityList').innerHTML = clxComp.skeleton(8, 3);
  load();
});
async function load() {
  var res = await clxApi.clientGet('activity', { limit: 60 });
  var el = document.getElementById('activityList');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var rows = (res.data && res.data.activity) || [];
  if (!rows.length) { clxComp.renderEmpty(el, 'No activity recorded yet.', 'activity'); return; }
  clxComp.renderList(el, rows, function (r) {
    var key = (r.event_type || r.event || '').toLowerCase().replace(/\s+/g, '_');
    var ic = EVT_ICON[key] || EVT_ICON.default;
    var variant = EVT_VARIANT[key] || EVT_VARIANT.default;
    return {
      leftIcon: ic, leftIconVariant: variant,
      primary:   r.company || r.event || '(activity)',
      secondary: r.detail || (r.from_status && r.to_status ? (r.from_status + ' → ' + r.to_status) : ''),
      badge:     r.lead_status || r.event_type,
      right:     clxComp.relativeTime(r.occurred_at || r.updated_at)
    };
  });
}
</script>
</body>
</html>
