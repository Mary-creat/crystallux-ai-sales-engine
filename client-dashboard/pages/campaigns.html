<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campaigns · Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Client</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Campaigns</h1>
      <div class="clx-page-sub">Active outreach sequences and their performance.</div>
    </div></div>
    <div class="clx-stat-grid" id="cmpStats"></div>
    <div id="cmpList"></div>
  </div></main>
</div>
<nav class="clx-bottom-nav" id="clxBottomNav"></nav>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
var CHANNEL_ICON = { email: 'mail', sms: 'message-square', linkedin: 'briefcase', dm: 'message-square', call: 'activity' };

clxAuth.require('client').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.injectBottomNav(document.getElementById('clxBottomNav'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));

  var stats = document.getElementById('cmpStats');
  for (var i = 0; i < 4; i++) {
    stats.insertAdjacentHTML('beforeend',
      '<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>');
  }
  document.getElementById('cmpList').innerHTML = clxComp.skeleton(5, 3);

  load();
});
async function load() {
  var res = await clxApi.clientGet('campaigns');
  var el = document.getElementById('cmpList');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  clxComp.renderStatGrid(document.getElementById('cmpStats'), [
    { label: 'Active campaigns', value: d.active_count != null ? d.active_count : '—',
      icon: 'play', variant: 'activity' },
    { label: 'Sent (7d)',        value: d.sent_7d      != null ? d.sent_7d      : '—',
      icon: 'mail', variant: 'leads' },
    { label: 'Replies (7d)',     value: d.replies_7d   != null ? d.replies_7d   : '—',
      icon: 'message-square', variant: 'bookings' },
    { label: 'Reply rate',       value: d.reply_rate   != null ? (Math.round(d.reply_rate * 100) + '%') : '—',
      icon: 'trending-up', variant: 'revenue' }
  ]);
  var rows = d.campaigns || [];
  if (!rows.length) { clxComp.renderEmpty(el, 'No campaigns yet. Your first sequences land within 7 days of activation.', 'play'); return; }
  clxComp.renderList(el, rows, function (r) {
    var ch = (r.channel || '').toLowerCase();
    var sent = r.sent || 0, replied = r.replied || 0;
    var rate = sent > 0 ? (replied / sent * 100) : 0;
    return {
      leftIcon: CHANNEL_ICON[ch] || 'zap',
      leftIconVariant: ch === 'email' ? 'sky' : ch === 'sms' ? 'emerald' : ch === 'linkedin' ? 'purple' : 'gray',
      primary: r.name || r.campaign_name || '(unnamed)',
      secondary: [r.channel, r.status].filter(Boolean).join(' · ') + (sent ? ' · ' + sent + ' sent' : ''),
      badge: r.status,
      right: clxComp.relativeTime(r.updated_at),
      extra: sent > 0
        ? '<span style="display:inline-flex;align-items:center;gap:8px;width:200px">' +
            '<span style="flex:1">' + clxComp.progressBar(rate, 100) + '</span>' +
            '<span style="font-size:12px;color:var(--text-muted)">' + Math.round(rate) + '% reply</span>' +
          '</span>'
        : null
    };
  });
}
</script>
</body>
</html>
