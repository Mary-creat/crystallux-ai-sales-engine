<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Billing · Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Client</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head"><div>
      <h1 class="clx-page-title">Billing</h1>
      <div class="clx-page-sub">Your subscription and payment history.</div>
    </div></div>
    <div id="billBody"></div>
  </div></main>
</div>
<nav class="clx-bottom-nav" id="clxBottomNav"></nav>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script src="/shared/copilot.js"></script>
<script>
clxAuth.require('client').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.injectBottomNav(document.getElementById('clxBottomNav'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));

  document.getElementById('billBody').innerHTML =
    '<div class="clx-stat-grid">' +
      Array(4).fill('<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>').join('') +
    '</div>' +
    '<div class="clx-card"><span class="clx-skeleton" style="height:120px;display:block"></span></div>';

  load();
});
async function load() {
  var res = await clxApi.clientGet('billing');
  var el = document.getElementById('billBody');
  if (!res.ok) { clxApi.renderError(el, res); return; }
  var d = res.data || {};
  var b = d.billing || {};
  var portalUrl = d.portal_url;
  var status = (b.subscription_status || '').toLowerCase();

  var banner = '';
  if (status === 'past_due') {
    banner = '<div class="clx-error-banner" style="display:flex;align-items:center;gap:10px">' +
      clxComp.icon('alert-triangle', 'md') +
      '<span>Payment failed. Update billing to keep your engine running.</span></div>';
  } else if (status === 'trialing') {
    var days = b.trial_ends_at ? Math.max(0, Math.ceil((new Date(b.trial_ends_at) - new Date()) / (1000*60*60*24))) : null;
    banner = '<div class="clx-error-banner" style="background:#E0F2FE;border-color:#BAE6FD;color:#0C4A6E;display:flex;align-items:center;gap:10px">' +
      clxComp.icon('clock', 'md') +
      '<span>Trial ends ' + (days != null ? ('in ' + days + ' day' + (days === 1 ? '' : 's') + '.') : 'soon.') + '</span></div>';
  }

  el.innerHTML = banner +
    '<div class="clx-stat-grid" id="bStats"></div>' +
    '<div class="clx-card">' +
      '<div class="clx-card-head"><div class="clx-card-title" style="display:inline-flex;align-items:center;gap:8px">' +
        clxComp.icon('dollar-sign', 'sm') + 'Subscription</div></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;font-size:13.5px">' +
        kv('Status', '<span class="clx-badge clx-badge-' + clxComp.badgeFor(b.subscription_status) + (status === 'past_due' ? ' --pulse' : '') + '">' + clxComp.escapeHtml(b.subscription_status || '—') + '</span>', true) +
        kv('Plan',          b.subscription_plan) +
        kv('Next billing',  clxComp.formatDate(b.next_billing_date)) +
        kv('Last payment',  clxComp.formatMoney(b.last_payment_amount)) +
        kv('Last paid on',  clxComp.formatDate(b.last_payment_at)) +
        kv('Trial ends',    clxComp.formatDate(b.trial_ends_at)) +
      '</div>' +
      '<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">' +
        (portalUrl ? '<a href="' + clxComp.escapeHtml(portalUrl) + '" class="clx-btn clx-btn-primary" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px">' +
          clxComp.icon('settings', 'sm') + 'Manage subscription</a>' : '') +
        '<a href="/onboarding/" class="clx-btn clx-btn-secondary" style="display:inline-flex;align-items:center;gap:8px">' +
          clxComp.icon('trending-up', 'sm') + 'Upgrade plan</a>' +
        (status !== 'canceled' ? '<button type="button" class="clx-btn clx-btn-danger" id="cancelBtn" style="display:inline-flex;align-items:center;gap:8px">' +
          clxComp.icon('x-circle', 'sm') + 'Cancel</button>' : '') +
      '</div>' +
    '</div>' +

    '<div class="clx-card" style="margin-top:14px;padding:0">' +
      '<div class="clx-card-head" style="padding:16px 18px 0">' +
        '<div class="clx-card-title" style="display:inline-flex;align-items:center;gap:8px">' +
        clxComp.icon('inbox', 'sm') + 'Invoice history · last 12</div>' +
      '</div>' +
      '<div id="invoicesTable" style="padding:8px 0 8px 0"></div>' +
    '</div>';

  clxComp.renderStatGrid(document.getElementById('bStats'), [
    { label: 'Status', value: b.subscription_status || '—',
      icon: status === 'past_due' ? 'alert-triangle' : 'check-circle',
      variant: status === 'past_due' ? 'errors' : 'activity' },
    { label: 'Plan',         value: b.subscription_plan || '—',
      icon: 'sparkles', variant: 'leads' },
    { label: 'Last payment', value: clxComp.formatMoney(b.last_payment_amount),
      icon: 'dollar-sign', variant: 'revenue' },
    { label: 'Next billing', value: clxComp.formatDate(b.next_billing_date),
      icon: 'calendar', variant: 'bookings' }
  ]);

  // Invoice history — use array passed by the billing endpoint if present,
  // otherwise show a synthesized "current period" row from the client row.
  var invoices = (d.invoices || (b.last_payment_at ? [{
    paid_at: b.last_payment_at,
    amount: b.last_payment_amount,
    plan: b.subscription_plan,
    status: 'paid'
  }] : []));
  var invEl = document.getElementById('invoicesTable');
  if (!invoices.length) {
    clxComp.renderEmpty(invEl, 'No invoices yet. Your first invoice will appear here once your trial converts.', 'inbox');
  } else {
    clxComp.renderList(invEl, invoices, function(inv){
      return {
        leftIcon: 'dollar-sign',
        leftIconVariant: inv.status === 'paid' ? 'emerald' : 'amber',
        primary: clxComp.formatMoney(inv.amount) + ' · ' + (inv.plan || 'subscription'),
        secondary: clxComp.formatDate(inv.paid_at),
        badge: inv.status,
        right: inv.invoice_pdf_url ? '<a href="' + clxComp.escapeHtml(inv.invoice_pdf_url) + '" target="_blank">View PDF</a>' : ''
      };
    });
  }

  // Cancel button — opens confirmation flow (calls Stripe cancel endpoint)
  var cancelBtn = document.getElementById('cancelBtn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function () {
      if (!confirm('Cancel your subscription? You\'ll keep access until the end of the current billing period. You can re-subscribe anytime.')) return;
      cancelBtn.disabled = true; cancelBtn.textContent = 'Cancelling…';
      clxApi.clientPost('billing/cancel', {}).then(function (r) {
        if (r.ok) { alert('Subscription cancelled. Access continues until ' + clxComp.formatDate(b.next_billing_date) + '.'); load(); }
        else { alert('Could not cancel: ' + (r.error || 'unknown error') + '. Use Manage subscription to retry.'); cancelBtn.disabled = false; cancelBtn.textContent = 'Cancel'; }
      });
    });
  }
}
function kv(k, v, isHtml) {
  return '<div><div class="clx-stat-label">' + k + '</div><div style="margin-top:3px">' + (isHtml ? v : clxComp.escapeHtml(v == null || v === '' ? '—' : v)) + '</div></div>';
}
</script>
</body>
</html>
