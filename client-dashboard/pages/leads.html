<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leads · Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head>
<body>
<header class="clx-topbar">
  <div class="clx-topbar-left">
    <a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Client</span></a>
  </div>
  <div class="clx-topbar-right" id="clxTopbarRight"></div>
</header>
<div class="clx-shell">
  <nav class="clx-sidebar" id="clxSidebar"></nav>
  <main class="clx-main"><div class="clx-content">
    <div class="clx-page-head">
      <div>
        <h1 class="clx-page-title">My leads</h1>
        <div class="clx-page-sub">All leads in your pipeline.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <span class="clx-input-wrap">
          <span class="clx-icon-prefix" id="searchIcon"></span>
          <input id="searchInput" class="clx-input" placeholder="Search company…" style="min-width:200px;padding-left:34px">
        </span>
        <select class="clx-select" id="statusFilter" style="width:160px">
          <option value="all">All statuses</option>
          <option>New Lead</option><option>Researched</option><option>Scored</option>
          <option>Outreach Ready</option><option>Contacted</option><option>Replied</option>
          <option>Booking Sent</option><option>Booked</option><option>Lost</option>
        </select>
      </div>
    </div>

    <div id="kpiGrid" class="clx-stat-grid"></div>
    <div id="leadsList"></div>
  </div></main>
</div>
<nav class="clx-bottom-nav" id="clxBottomNav"></nav>

<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/components.js"></script>
<script>
var __rows = [];

clxAuth.require('client').then(function () {
  clxComp.injectNav(document.getElementById('clxSidebar'));
  clxComp.injectBottomNav(document.getElementById('clxBottomNav'));
  clxComp.renderTopbarUser(document.getElementById('clxTopbarRight'));
  document.getElementById('searchIcon').innerHTML = clxComp.icon('search', 'sm');

  var kpi = document.getElementById('kpiGrid');
  for (var i = 0; i < 4; i++) {
    kpi.insertAdjacentHTML('beforeend',
      '<div class="clx-stat-card"><span class="clx-skeleton" style="width:50%;height:10px"></span><div style="height:10px"></div><span class="clx-skeleton" style="width:40%;height:24px"></span></div>');
  }
  document.getElementById('leadsList').innerHTML = clxComp.skeleton(6, 3);

  load();
  document.getElementById('statusFilter').addEventListener('change', load);
  document.getElementById('searchInput').addEventListener('input', renderRows);
});

async function load() {
  var status = document.getElementById('statusFilter').value;
  var filters = { limit: 100 };
  if (status && status !== 'all') filters.status = status;
  var res = await clxApi.clientGet('leads', filters);
  if (!res.ok) { clxApi.renderError(document.getElementById('leadsList'), res); return; }
  __rows = (res.data && res.data.leads) || [];
  renderKpis();
  renderRows();
}

function renderKpis() {
  var total = __rows.length;
  var contacted = __rows.filter(function(r){ return ['contacted','replied','booking sent','booked'].indexOf((r.lead_status||'').toLowerCase()) !== -1; }).length;
  var replied   = __rows.filter(function(r){ return ['replied','booking sent','booked'].indexOf((r.lead_status||'').toLowerCase()) !== -1; }).length;
  var booked    = __rows.filter(function(r){ return (r.lead_status||'').toLowerCase() === 'booked'; }).length;
  clxComp.renderStatGrid(document.getElementById('kpiGrid'), [
    { label: 'In view',   value: total,    icon: 'target',         variant: 'leads'    },
    { label: 'Contacted', value: contacted,icon: 'mail',           variant: 'activity' },
    { label: 'Replied',   value: replied,  icon: 'message-square', variant: 'bookings' },
    { label: 'Booked',    value: booked,   icon: 'calendar',       variant: 'revenue'  }
  ]);
}

function renderRows() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var rows = __rows.filter(function(r){
    if (!q) return true;
    return [r.company, r.industry, r.city].some(function(v){
      return (v || '').toLowerCase().indexOf(q) !== -1;
    });
  });
  var el = document.getElementById('leadsList');
  if (!rows.length) {
    clxComp.renderEmpty(el, 'No leads match this filter yet.', 'inbox');
    return;
  }
  clxComp.renderList(el, rows, function (r) {
    return {
      leftIcon: 'target', leftIconVariant: 'purple',
      primary: r.company || '(no company)',
      secondary: [r.industry, r.city].filter(Boolean).join(' · '),
      badge: r.lead_status,
      right: clxComp.relativeTime(r.updated_at),
      extra: r.lead_score != null
        ? '<span style="display:inline-flex;align-items:center;gap:8px;width:160px">' +
            clxComp.scoreBar(r.lead_score) +
            '<span style="font-size:12px;color:var(--text-muted)">score ' + r.lead_score + '</span>' +
          '</span>'
        : null
    };
  });
}
</script>
</body>
</html>
