<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training Coach · Crystallux</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://automation.crystallux.org; base-uri 'self'; upgrade-insecure-requests;">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/layout.css">
</head><body>
<header class="clx-topbar"><div class="clx-topbar-left"><a href="/pages/overview.html" class="clx-logo"><span class="clx-logo-mark">C</span>Crystallux <span class="clx-role-pill">Training</span></a></div><div class="clx-topbar-right" id="clxTopbarRight"><span class="clx-user-chip"><span class="clx-spinner"></span></span></div></header>
<div class="clx-shell"><nav class="clx-sidebar" id="clxSidebar"></nav><main class="clx-main"><div class="clx-content">
  <div class="clx-page-head"><div><h1 class="clx-page-title">Training Coach</h1><div class="clx-page-sub">Practice sales conversations with an AI coach. Pick a topic or just start typing.</div></div></div>
  <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">Topic</div></div><select id="topicSelect" class="clx-select"><option value="">Pick a topic (optional)</option></select></div>
  <div class="clx-card"><div class="clx-card-head"><div class="clx-card-title">Conversation</div></div><div id="chatLog" style="min-height:280px;max-height:480px;overflow-y:auto;padding:8px;border:1px solid var(--border, #e5e7eb);border-radius:8px;background:#fafafa"></div>
    <form id="msgForm" style="margin-top:12px;display:flex;gap:8px"><input type="text" id="msgInput" placeholder="Type your message..." style="flex:1;padding:10px;border:1px solid var(--border, #e5e7eb);border-radius:6px"><button class="clx-btn clx-btn-primary" type="submit">Send</button></form>
  </div>
</div></main></div>
<script src="/shared/auth.js"></script><script src="/shared/api.js"></script><script src="/shared/components.js"></script>
<script>
(function(){
  fetch('/shared/nav.html').then(function(r){return r.text();}).then(function(h){document.getElementById('clxSidebar').innerHTML = h;});
  clxAuth.require(['admin','supervisor','mga_principal','advisor','sub_agent','client_admin','client_user']).then(function(user){
    if(!user)return;
    document.getElementById('clxTopbarRight').innerHTML = '<span class="clx-user-chip">'+clxApi.escapeHtml(user.email||'')+'</span>';
    loadTopics();
  });
  var sessionId = null;
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function append(role, text){var el=document.createElement('div');el.style.margin='8px 0';el.style.padding='8px 12px';el.style.borderRadius='6px';el.style.background=role==='user'?'#dbeafe':'#fff';el.style.maxWidth='80%';el.style.marginLeft=role==='user'?'auto':'0';el.innerHTML='<strong>'+(role==='user'?'You':'Coach')+':</strong> '+esc(text);document.getElementById('chatLog').appendChild(el);document.getElementById('chatLog').scrollTop=999999;}
  function loadTopics(){
    clxApi.call('api/training/topics', {}).then(function(resp){
      if(!resp.ok)return;
      var sel = document.getElementById('topicSelect');
      (resp.data.topics || []).forEach(function(t){var o=document.createElement('option');o.value=t.id;o.text=t.topic_title+' ('+t.topic_category+')';sel.appendChild(o);});
    });
  }
  document.getElementById('msgForm').addEventListener('submit', function(e){
    e.preventDefault();
    var input = document.getElementById('msgInput');
    var msg = input.value.trim();
    if(!msg) return;
    append('user', msg);
    input.value = '';
    var topicId = document.getElementById('topicSelect').value || null;
    clxApi.call('api/training/chat', { message: msg, topic_id: topicId, session_id: sessionId }).then(function(resp){
      if(!resp.ok){append('coach', 'Sorry, '+resp.error);return;}
      sessionId = resp.data.session_id;
      append('coach', resp.data.reply || '...');
      if(resp.data.competency_score!=null) append('coach', '[Competency: '+resp.data.competency_score+'/100]');
    });
  });
})();
</script>
</body></html>
